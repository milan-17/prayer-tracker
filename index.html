<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OraTrack - Daily Prayer Companion</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: linear-gradient(135deg,#1e1e2f,#2b2b45);
    color:white;
}
header{
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
.container{
    padding:15px;
}
.card{
    background: rgba(255,255,255,0.08);
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    backdrop-filter: blur(10px);
}
button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:3px;
}
.primary{ background:#ff7b00; color:white;}
.secondary{ background:#444; color:white;}
.toggle{
    width:40px;height:20px;background:#555;border-radius:20px;
    position:relative;cursor:pointer;
}
.toggle::after{
    content:'';width:18px;height:18px;background:white;
    position:absolute;top:1px;left:1px;border-radius:50%;
    transition:0.3s;
}
.toggle.active{background:#00c853;}
.toggle.active::after{left:21px;}
input{padding:8px;border-radius:6px;border:none;margin:5px 0;width:100%;}
canvas{background:white;border-radius:10px;margin-top:10px;}
.footer{
    text-align:center;
    font-size:12px;
    opacity:0.6;
    padding:15px;
}
</style>
</head>
<body>

<header>OraTrack - Daily Prayer Companion</header>

<div class="container">

<div class="card">
<h3>Today's Prayers</h3>

<div>
Rosary: <span id="rosaryCount">0</span>
<button class="primary" onclick="increment('rosary')">+</button>
<button class="secondary" onclick="decrement('rosary')">-</button>
</div>

<div>
Divine Mercy: <span id="mercyCount">0</span>
<button class="primary" onclick="increment('mercy')">+</button>
<button class="secondary" onclick="decrement('mercy')">-</button>
</div>

<div style="margin-top:10px;">
Holy Mass:
<div class="toggle" id="massToggle" onclick="toggleMass()"></div>
</div>

</div>

<div class="card">
<h3>Add Custom Prayer</h3>
<input type="text" id="customName" placeholder="Prayer Name">
<button class="primary" onclick="addCustom()">Add</button>
<div id="customList"></div>
</div>

<div class="card">
<h3>Weekly Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Backup</h3>
<button class="primary" onclick="exportData()">Export Data</button>
<input type="file" onchange="importData(event)">
</div>

</div>

<div class="footer">
Offline • Private • Stored on your device
</div>

<script>
let data = JSON.parse(localStorage.getItem("oraData")) || {
    rosary:0,
    mercy:0,
    mass:false,
    custom:{}
};

function save(){
    localStorage.setItem("oraData",JSON.stringify(data));
    updateUI();
}

function increment(type){
    data[type]++;
    save();
}

function decrement(type){
    if(data[type]>0) data[type]--;
    save();
}

function toggleMass(){
    data.mass=!data.mass;
    save();
}

function addCustom(){
    let name=document.getElementById("customName").value;
    if(!name) return;
    data.custom[name]=0;
    document.getElementById("customName").value="";
    save();
}

function updateUI(){
    document.getElementById("rosaryCount").innerText=data.rosary;
    document.getElementById("mercyCount").innerText=data.mercy;
    document.getElementById("massToggle").classList.toggle("active",data.mass);

    let list=document.getElementById("customList");
    list.innerHTML="";
    for(let key in data.custom){
        list.innerHTML+=`
        <div style="margin-top:8px;">
        ${key}: ${data.custom[key]}
        <button class="primary" onclick="data.custom['${key}']++;save()">+</button>
        <button class="secondary" onclick="if(data.custom['${key}']>0)data.custom['${key}']--;save()">-</button>
        </div>`;
    }
    updateChart();
}

function exportData(){
    let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="oratack_backup.json";
    a.click();
}

function importData(event){
    let file=event.target.files[0];
    let reader=new FileReader();
    reader.onload=function(e){
        data=JSON.parse(e.target.result);
        save();
    }
    reader.readAsText(file);
}

function updateChart(){
    let ctx=document.getElementById('chart').getContext('2d');
    if(window.myChart) window.myChart.destroy();
    window.myChart=new Chart(ctx,{
        type:'bar',
        data:{
            labels:['Rosary','Divine Mercy'],
            datasets:[{
                label:'Today',
                data:[data.rosary,data.mercy],
                backgroundColor:['#ff7b00','#00c853']
            }]
        }
    });
}

updateUI();
</script>

</body>
</html>
